<!-- Page Metadata -->
<div id="page-metadata" data-title="Contas a Receber" data-icon="fa-arrow-down" style="display:none;"></div>

<div class="page-wrapper page-contas-receber">

    <!-- Submenu Financeiro -->
    <nav class="page-card financeiro-submenu" aria-label="Navegação financeira">
        <a href="#" onclick="AppRouter.navigate('financeiro'); return false;" class="submenu-link">
            <i class="fas fa-home"></i> Início
        </a>
        <a href="#" onclick="AppRouter.navigate('contas_pagar'); return false;" class="submenu-link">
            <i class="fas fa-arrow-up"></i> Contas a Pagar
        </a>
        <a href="#" onclick="AppRouter.navigate('contas_receber'); return false;" class="submenu-link active">
            <i class="fas fa-arrow-down"></i> Contas a Receber
        </a>
        <a href="#" onclick="AppRouter.navigate('planos_contas'); return false;" class="submenu-link">
            <i class="fas fa-list"></i> Planos de Contas
        </a>
    </nav>

    <!-- KPIs -->
    <div class="stats-grid cr-stats">
        <div class="page-card kpi-card">
            <div class="kpi-content">
                <h3>Total a Receber</h3>
                <div class="value receita" id="cr_totalReceber">R$ 0,00</div>
            </div>
            <div class="kpi-icon receita"><i class="fas fa-clock"></i></div>
        </div>
        <div class="page-card kpi-card">
            <div class="kpi-content">
                <h3>Total Recebido</h3>
                <div class="value receita" id="cr_totalRecebido">R$ 0,00</div>
            </div>
            <div class="kpi-icon receita"><i class="fas fa-check-circle"></i></div>
        </div>
        <div class="page-card kpi-card">
            <div class="kpi-content">
                <h3>Contas Atrasadas</h3>
                <div class="value" id="cr_contasAtrasadas" style="color:#dc2626;">0</div>
            </div>
            <div class="kpi-icon" style="background:#fee2e2;color:#dc2626;"><i class="fas fa-exclamation-circle"></i></div>
        </div>
    </div>

    <!-- Alerta -->
    <div id="cr_alertContainer"></div>

    <!-- Formulário de Cadastro -->
    <div class="page-card cr-form-card">
        <div class="card-header-row">
            <h2><i class="fas fa-plus-circle" style="color:#16a34a;"></i> Nova Conta a Receber</h2>
        </div>

        <form id="cr_formCadastro" autocomplete="off">
            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Nº do Documento <span class="required">*</span></label>
                    <input type="text" name="numero_documento" class="form-control" placeholder="Fatura, Recibo, etc" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Plano de Contas <span class="required">*</span></label>
                    <select name="plano_conta_id" class="form-control" id="cr_selectPlano" required>
                        <option value="">Selecione um plano...</option>
                    </select>
                </div>
            </div>

            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Morador <span class="required">*</span></label>
                    <input type="text" name="morador_nome" class="form-control" placeholder="Nome do morador" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Unidade</label>
                    <input type="text" name="unidade_numero" class="form-control" placeholder="Ex: Gleba 5">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Descrição <span class="required">*</span></label>
                <textarea name="descricao" class="form-control" rows="2" placeholder="Descrição da receita..." required></textarea>
            </div>

            <div class="form-grid-2">
                <div class="form-group">
                    <label class="form-label">Valor <span class="required">*</span></label>
                    <input type="number" name="valor_original" class="form-control" placeholder="0,00" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Data de Vencimento <span class="required">*</span></label>
                    <input type="date" name="data_vencimento" class="form-control" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Observações</label>
                <textarea name="observacoes" class="form-control" rows="2" placeholder="Observações adicionais..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success" id="cr_btnSalvar">
                    <i class="fas fa-save"></i> Cadastrar Conta
                </button>
                <button type="button" class="btn btn-secondary" onclick="ContasReceber.limparForm()">
                    <i class="fas fa-eraser"></i> Limpar
                </button>
            </div>
        </form>
    </div>

    <!-- Listagem -->
    <div class="page-card">
        <div class="card-header-row">
            <h2><i class="fas fa-table"></i> Contas a Receber</h2>
            <div class="cr-filtros">
                <select id="cr_filtroStatus" class="form-control form-control-sm" onchange="ContasReceber.filtrar()">
                    <option value="">Todos os status</option>
                    <option value="PENDENTE">Pendente</option>
                    <option value="RECEBIDO">Recebido</option>
                    <option value="PARCIAL">Parcial</option>
                    <option value="CANCELADO">Cancelado</option>
                </select>
                <button class="btn btn-sm btn-outline" onclick="ContasReceber.carregar()">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
            </div>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Documento</th>
                        <th>Morador</th>
                        <th>Unidade</th>
                        <th>Valor</th>
                        <th>Vencimento</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="cr_corpoTabela">
                    <tr>
                        <td colspan="7" class="empty-table">
                            <i class="fas fa-spinner fa-spin"></i> Carregando...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Recebimento -->
<div class="modal-overlay" id="cr_modalRecebimento" style="display:none;" onclick="if(event.target===this)ContasReceber.fecharModal()">
    <div class="modal-box">
        <div class="modal-header">
            <h3><i class="fas fa-hand-holding-usd"></i> Registrar Recebimento</h3>
            <button class="modal-close-btn" onclick="ContasReceber.fecharModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="cr_formRecebimento">
                <input type="hidden" name="id" id="cr_receberId">

                <div class="form-group">
                    <label class="form-label">Valor Recebido <span class="required">*</span></label>
                    <input type="number" name="valor_pago" class="form-control" placeholder="0,00" step="0.01" min="0.01" required>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label class="form-label">Data de Recebimento <span class="required">*</span></label>
                        <input type="date" name="data_pagamento" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Forma de Recebimento</label>
                        <select name="forma_pagamento" class="form-control">
                            <option value="">Selecione...</option>
                            <option value="DINHEIRO">Dinheiro</option>
                            <option value="CHEQUE">Cheque</option>
                            <option value="TRANSFERENCIA">Transferência</option>
                            <option value="CARTAO">Cartão</option>
                            <option value="BOLETO">Boleto</option>
                            <option value="PIX">PIX</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Observações</label>
                    <textarea name="observacoes" class="form-control" rows="2" placeholder="Observações do recebimento..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-success">
                        <i class="fas fa-check"></i> Registrar Recebimento
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="ContasReceber.fecharModal()">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
