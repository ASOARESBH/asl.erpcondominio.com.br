<!-- Page Metadata for AppRouter -->
<div id="page-metadata" data-title="Entrada de Estoque" data-icon="fa-arrow-down" style="display:none;"></div>

<!-- Modern Page Wrapper -->
<div class="page-wrapper page-estoque">

    <!-- Page Header -->
    <div class="page-header-est">
        <div class="page-header-content">
            <h1><i class="fas fa-arrow-down" style="color:#2563eb;margin-right:10px;"></i>Entrada de Material</h1>
            <p>Registrar entrada de produtos no inventário</p>
        </div>
        <div class="page-header-actions">
            <button class="btn-est btn-secondary-est" data-page="estoque">
                <i class="fas fa-arrow-left"></i> Voltar ao Inventário
            </button>
        </div>
    </div>

    <!-- Submenu (Tabs) -->
    <div class="tabs-est">
        <button class="tab-btn-est" data-page="estoque">
            <i class="fas fa-boxes"></i> Produtos
        </button>
        <button class="tab-btn-est active" data-page="entrada_estoque">
            <i class="fas fa-arrow-down"></i> Entrada
        </button>
        <button class="tab-btn-est" data-page="saida_estoque">
            <i class="fas fa-arrow-up"></i> Saída
        </button>
        <button class="tab-btn-est" data-page="relatorio_estoque">
            <i class="fas fa-chart-bar"></i> Relatórios
        </button>
    </div>

    <div id="alertContainer"></div>

    <div class="card-est">
        <div class="card-header-est">
            <h2><i class="fas fa-plus-circle"></i> Registrar Nova Entrada</h2>
        </div>
        <form id="entradaForm">
            <div class="form-grid-est">
                <div class="form-group-est">
                    <label for="produto_id">Produto / Material *</label>
                    <select id="produto_id" required>
                        <option value="">Selecione o produto...</option>
                    </select>
                </div>
                <div class="form-group-est">
                    <label for="quantidade">Quantidade *</label>
                    <input type="number" id="quantidade" step="0.01" min="0.01" required placeholder="0.00">
                </div>
                <div class="form-group-est">
                    <label for="preco_unitario">Preço de Custo Unitário (R$) *</label>
                    <input type="number" id="preco_unitario" step="0.01" min="0" required placeholder="0.00">
                </div>
                <div class="form-group-est">
                    <label for="documento">Documento / NF</label>
                    <input type="text" id="documento" placeholder="Ex: NF-12345">
                </div>
                <div class="form-group-est">
                    <label for="data_movimentacao">Data da Entrada *</label>
                    <input type="date" id="data_movimentacao" required>
                </div>
                <div class="form-group-est">
                    <label for="fornecedor">Fornecedor</label>
                    <input type="text" id="fornecedor" placeholder="Nome do fornecedor">
                </div>
            </div>
            <div class="form-group-est" style="margin-top: 1rem;">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" rows="2" placeholder="Motivo da entrada ou detalhes adicionais..."></textarea>
            </div>
            <div style="margin-top: 1.5rem;">
                <button type="submit" class="btn-est btn-primary-est"><i class="fas fa-save"></i> Confirmar Entrada</button>
            </div>
        </form>
    </div>

    <!-- Histórico Recente -->
    <div class="card-est">
        <div class="card-header-est">
            <h2><i class="fas fa-history"></i> Últimas Entradas</h2>
        </div>
        <div class="table-responsive-est">
            <table class="data-table-est" id="historicoEntradasTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Material</th>
                        <th>Qtd.</th>
                        <th>Vlr. Unit</th>
                        <th>Total</th>
                        <th>Documento</th>
                        <th>Fornecedor</th>
                    </tr>
                </thead>
                <tbody id="historicoEntradasBody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 2rem; color: #94a3b8;">
                            Carregando histórico...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
