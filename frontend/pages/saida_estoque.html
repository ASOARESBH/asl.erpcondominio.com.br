<!-- Page Metadata for AppRouter -->
<div id="page-metadata" data-title="Saída de Estoque" data-icon="fa-arrow-up" style="display:none;"></div>

<!-- Modern Page Wrapper -->
<div class="page-wrapper page-estoque">

    <!-- Page Header -->
    <div class="page-header-est">
        <div class="page-header-content">
            <h1><i class="fas fa-arrow-up" style="color:#2563eb;margin-right:10px;"></i>Saída de Material</h1>
            <p>Registrar saída ou baixa de produtos do inventário</p>
        </div>
        <div class="page-header-actions">
            <button class="btn-est btn-secondary-est" data-page="estoque">
                <i class="fas fa-arrow-left"></i> Voltar ao Inventário
            </button>
        </div>
    </div>

    <!-- Submenu (Tabs) -->
    <div class="tabs-est">
        <button class="tab-btn-est" data-page="estoque">
            <i class="fas fa-boxes"></i> Produtos
        </button>
        <button class="tab-btn-est" data-page="entrada_estoque">
            <i class="fas fa-arrow-down"></i> Entrada
        </button>
        <button class="tab-btn-est active" data-page="saida_estoque">
            <i class="fas fa-arrow-up"></i> Saída
        </button>
        <button class="tab-btn-est" data-page="relatorio_estoque">
            <i class="fas fa-chart-bar"></i> Relatórios
        </button>
    </div>

    <div id="alertContainer"></div>

    <div class="card-est">
        <div class="card-header-est">
            <h2><i class="fas fa-minus-circle"></i> Registrar Nova Saída</h2>
        </div>
        <form id="saidaForm">
            <div class="form-grid-est">
                <div class="form-group-est" style="grid-column: span 2;">
                    <label for="produto_id">Produto / Material *</label>
                    <select id="produto_id" required>
                        <option value="">Selecione o produto...</option>
                    </select>
                </div>
                <div class="form-group-est">
                    <label for="quantidade">Quantidade *</label>
                    <input type="number" id="quantidade" step="0.01" min="0.01" required placeholder="0.00">
                </div>
                <div class="form-group-est">
                    <label for="tipo_saida">Tipo de Saída *</label>
                    <select id="tipo_saida" required>
                        <option value="Consumo">Consumo Interno</option>
                        <option value="Manutenção">Manutenção</option>
                        <option value="Baixa">Baixa (Avaria/Vencimento)</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group-est">
                    <label for="solicitante">Solicitante / Responsável</label>
                    <input type="text" id="solicitante" placeholder="Quem retirou o material">
                </div>
                <div class="form-group-est">
                    <label for="data_movimentacao">Data da Saída *</label>
                    <input type="date" id="data_movimentacao" required>
                </div>
                <div class="form-group-est" style="grid-column: span 2;">
                    <label for="destino">Destino (Local/Obra)</label>
                    <input type="text" id="destino" placeholder="Ex: Torre A - Reforma do átrio">
                </div>
            </div>
            <div class="form-group-est" style="margin-top: 1rem;">
                <label for="observacoes">Observações</label>
                <textarea id="observacoes" rows="2" placeholder="Motivo da saída ou detalhes da aplicação..."></textarea>
            </div>
            <div style="margin-top: 1.5rem;">
                <button type="submit" class="btn-est btn-primary-est"><i class="fas fa-save"></i> Confirmar Saída</button>
            </div>
        </form>
    </div>

    <!-- Histórico Recente -->
    <div class="card-est">
        <div class="card-header-est">
            <h2><i class="fas fa-history"></i> Últimas Saídas</h2>
        </div>
        <div class="table-responsive-est">
            <table class="data-table-est" id="historicoSaidasTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Material</th>
                        <th>Qtd.</th>
                        <th>Tipo</th>
                        <th>Solicitante</th>
                        <th>Destino</th>
                    </tr>
                </thead>
                <tbody id="historicoSaidasBody">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 2rem; color: #94a3b8;">
                            Carregando histórico...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
