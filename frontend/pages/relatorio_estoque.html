<!-- Page Metadata for AppRouter -->
<div id="page-metadata" data-title="Relatórios de Estoque" data-icon="fa-chart-bar" style="display:none;"></div>

<!-- Modern Page Wrapper -->
<div class="page-wrapper page-estoque">

    <!-- Page Header -->
    <div class="page-header-est">
        <div class="page-header-content">
            <h1><i class="fas fa-chart-bar" style="color:#2563eb;margin-right:10px;"></i>Relatórios de Estoque</h1>
            <p>Análise de movimentações, níveis de estoque e custos</p>
        </div>
        <div class="page-header-actions">
            <button class="btn-est btn-secondary-est" data-page="estoque">
                <i class="fas fa-arrow-left"></i> Voltar ao Inventário
            </button>
        </div>
    </div>

    <!-- Submenu (Tabs) -->
    <div class="tabs-est">
        <button class="tab-btn-est" data-page="estoque">
            <i class="fas fa-boxes"></i> Produtos
        </button>
        <button class="tab-btn-est" data-page="entrada_estoque">
            <i class="fas fa-arrow-down"></i> Entrada
        </button>
        <button class="tab-btn-est" data-page="saida_estoque">
            <i class="fas fa-arrow-up"></i> Saída
        </button>
        <button class="tab-btn-est active" data-page="relatorio_estoque">
            <i class="fas fa-chart-bar"></i> Relatórios
        </button>
    </div>

    <div id="alertContainer"></div>

    <!-- Filtros do Relatório -->
    <div class="card-est">
        <div class="card-header-est">
            <h2><i class="fas fa-filter"></i> Filtros do Relatório</h2>
        </div>
        <form id="relatorioForm">
            <div class="form-grid-est">
                <div class="form-group-est">
                    <label for="tipo_relatorio">Tipo de Relatório *</label>
                    <select id="tipo_relatorio" required>
                        <option value="movimentacao">Movimentação Detalhada</option>
                        <option value="saldo">Saldo de Inventário</option>
                        <option value="baixo_estoque">Produtos com Estoque Baixo</option>
                    </select>
                </div>
                <div class="form-group-est">
                    <label for="data_inicio">Data Início</label>
                    <input type="date" id="data_inicio">
                </div>
                <div class="form-group-est">
                    <label for="data_fim">Data Fim</label>
                    <input type="date" id="data_fim">
                </div>
                <div class="form-group-est">
                    <label for="categoria">Categoria</label>
                    <select id="categoria">
                        <option value="">Todas as categorias</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                <button type="submit" class="btn-est btn-primary-est"><i class="fas fa-file-pdf"></i> Gerar Relatório</button>
                <button type="button" class="btn-est btn-secondary-est" id="btnExportExcel"><i class="fas fa-file-excel"></i> Exportar Excel</button>
            </div>
        </form>
    </div>

    <!-- Resultados -->
    <div class="card-est">
        <div class="card-header-est">
            <h2><i class="fas fa-table"></i> Resultados</h2>
        </div>
        <div class="table-responsive-est">
            <table class="data-table-est" id="relatorioTable">
                <thead>
                    <tr id="relatorioHeader">
                        <th>Data</th>
                        <th>Material</th>
                        <th>Tipo</th>
                        <th>Quant.</th>
                        <th>Vlr. Unit</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="relatorioBody">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 3rem; color: #94a3b8;">
                            Selecione os filtros e clique em "Gerar Relatório"
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
