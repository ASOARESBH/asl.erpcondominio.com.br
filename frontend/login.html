<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Controle de Acesso</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Design System CSS -->
    <link rel="stylesheet" href="../assets/css/app.css">
    <!-- Tema Azul (FASE 2) -->
    <link rel="stylesheet" href="../assets/css/themes/theme-blue.css">
    <!-- Global Config -->
    <script src="js/config.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--color-primary-600) 0%, var(--color-primary-700) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: var(--color-background-primary);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        /* ============================================
           LOGO QUADRADA - FORMATO PROFISSIONAL
           Sem círculo, quadrado com cantos suaves
           ============================================ */
        .logo-box {
            width: 120px;
            height: 120px;
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            overflow: hidden;
            position: relative;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
            display: block;
        }

        /* Shimmer de loading enquanto a logo carrega */
        .logo-box.loading {
            background: linear-gradient(90deg, #f0f4f8 25%, #e2e8f0 50%, #f0f4f8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Ícone fallback quando não há logo */
        .logo-box .logo-fallback-icon {
            font-size: 3rem;
            color: var(--color-primary-600);
        }

        .login-header h1 {
            color: var(--color-text-primary);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--color-text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--color-text-primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-text-tertiary);
            font-size: 1.1rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background: var(--color-background-tertiary);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary-600);
            background: var(--color-background-primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--color-primary-600) 0%, var(--color-primary-700) 100%);
            color: var(--color-background-primary);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background: var(--color-text-tertiary);
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .alert-error {
            background: var(--color-error-100);
            color: var(--color-error-900);
            border-left: 4px solid var(--color-error-700);
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert i {
            margin-right: 0.5rem;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--color-text-secondary);
            font-size: 0.85rem;
        }

        /* Loading spinner do botão */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--color-background-primary);
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .logo-box {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">

            <!-- Logo quadrada profissional -->
            <div class="logo-box loading" id="logoBox">
                <img id="loginLogo"
                     alt="Logo da Empresa"
                     style="display:none;"
                     onload="LogoManager.onLoad()"
                     onerror="LogoManager.onError()">
            </div>

            <p>Sistema de Controle de Acesso</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email"
                           placeholder="Digite seu e-mail"
                           required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" name="senha"
                           placeholder="Digite sua senha"
                           required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>

        <div class="footer">
            <p>&copy; 2025 Serra da Liberdade. Todos os direitos reservados.</p>
        </div>
    </div>

    <script>
        /**
         * LogoManager
         * Gerencia o carregamento dinâmico da logo da empresa.
         * Busca via endpoint público /api/get_logo_empresa.php
         * Fallback: uploads/logo/logoerp.png (ERP Condomínios)
         *
         * Arquitetura: este arquivo está em /frontend/login.html
         * Portanto, '../' aponta para a raiz do projeto.
         */
        const LogoManager = (function () {
            // ✅ URLs absolutas: eliminam qualquer ambiguidade de path relativo
            const API_LOGO = window.location.origin + '/api/get_logo_empresa.php';
            const FALLBACK = window.location.origin + '/uploads/logo/logoerp.png';

            const logoBox = document.getElementById('logoBox');
            const logoImg = document.getElementById('loginLogo');

            let fallbackAttempted = false;

            function init() {
                fetch(API_LOGO, {
                    method: 'GET',
                    credentials: 'include',
                    headers: { 'Accept': 'application/json' }
                })
                .then(function (res) {
                    if (!res.ok) throw new Error('API indisponível');
                    return res.json();
                })
                .then(function (data) {
                    if (data && data.sucesso && data.logo_url) {
                        // Normalizar URL: se for relativa, usa origin como base
                        let url = data.logo_url;
                        if (!url.startsWith('http') && !url.startsWith('/')) {
                            url = window.location.origin + '/' + url;
                        } else if (url.startsWith('/')) {
                            url = window.location.origin + url;
                        }
                        logoImg.src = url;
                        logoImg.style.display = 'block';
                    } else {
                        _useFallback();
                    }
                })
                .catch(function () {
                    _useFallback();
                });
            }

            function _useFallback() {
                logoImg.src = FALLBACK;
                logoImg.style.display = 'block';
            }

            function onLoad() {
                // Remove shimmer ao carregar com sucesso
                logoBox.classList.remove('loading');
            }

            function onError() {
                logoBox.classList.remove('loading');
                if (!fallbackAttempted) {
                    fallbackAttempted = true;
                    logoImg.src = FALLBACK;
                } else {
                    // Último recurso: ícone FontAwesome
                    logoImg.style.display = 'none';
                    logoBox.innerHTML = '<i class="fas fa-building logo-fallback-icon"></i>';
                }
            }

            return { init: init, onLoad: onLoad, onError: onError };
        })();

        // ============================================
        // LOGIN FORM
        // ============================================
        const loginForm = document.getElementById('loginForm');
        const btnLogin  = document.getElementById('btnLogin');
        const alertBox  = document.getElementById('alertBox');

        function mostrarAlerta(mensagem, tipo) {
            const icon = tipo === 'error' ? 'exclamation-circle' : 'check-circle';
            alertBox.innerHTML = `<i class="fas fa-${icon}"></i> ${mensagem}`;
            alertBox.className = `alert alert-${tipo}`;
            alertBox.style.display = 'block';
            setTimeout(function () {
                alertBox.style.display = 'none';
            }, 5000);
        }

        loginForm.addEventListener('submit', function (e) {
            e.preventDefault();

            btnLogin.disabled = true;
            btnLogin.innerHTML = '<span class="spinner"></span> Autenticando...';

            const formData = new FormData(loginForm);

            // ✅ URL absoluta: elimina /frontend/frontend/ independente de onde o arquivo está
            fetch(window.location.origin + '/api/validar_login.php', {
                method: 'POST',
                body: formData,
                credentials: 'include'
            })
            .then(function (response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(function (data) {
                if (data.sucesso) {
                    mostrarAlerta(data.mensagem, 'success');

                    if (data.dados && data.dados.nome) {
                        localStorage.setItem('usuario_nome', data.dados.nome);
                    }
                    if (data.dados && data.dados.permissao) {
                        localStorage.setItem('usuario_permissao', data.dados.permissao);
                    }

                    // ✅ REDIRECIONAMENTO CORRETO - URL absoluta elimina /frontend/frontend/
                    setTimeout(function () {
                        window.location.href = window.location.origin + '/frontend/layout-base.html?page=dashboard';
                    }, 500);
                } else {
                    mostrarAlerta(data.mensagem, 'error');
                    btnLogin.disabled = false;
                    btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                }
            })
            .catch(function (error) {
                console.error('[Login] Erro:', error);
                mostrarAlerta('Erro ao processar login. Tente novamente.', 'error');
                btnLogin.disabled = false;
                btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            });
        });

        // ============================================
        // MENSAGENS DE ERRO VIA URL PARAMS
        // ============================================
        (function () {
            const urlParams = new URLSearchParams(window.location.search);
            const erro = urlParams.get('erro');
            const msgs = {
                '1': 'E-mail ou senha incorretos!',
                '2': 'Usuário inativo. Entre em contato com o administrador.',
                '3': 'Preencha todos os campos!',
                '4': 'Sessão expirada. Faça login novamente.'
            };
            if (msgs[erro]) mostrarAlerta(msgs[erro], 'error');
        })();

        // ============================================
        // VERIFICAR SESSÃO ATIVA AO CARREGAR
        // ============================================
        document.addEventListener('DOMContentLoaded', function () {
            // Inicializar logo
            LogoManager.init();

            // Verificar se já está autenticado - URL absoluta
            fetch(window.location.origin + '/api/verificar_sessao.php', {
                method: 'GET',
                credentials: 'include'
            })
            .then(function (response) {
                if (!response.ok) return Promise.reject('Não autenticado');
                return response.json();
            })
            .then(function (data) {
                if (data && data.sucesso) {
                    // ✅ REDIRECIONAMENTO CORRETO - URL absoluta elimina /frontend/frontend/
                    window.location.href = window.location.origin + '/frontend/layout-base.html?page=dashboard';
                }
            })
            .catch(function () {
                // Não autenticado — mantém na página de login
            });
        });
    </script>
</body>

</html>
